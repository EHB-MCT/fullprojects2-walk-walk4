<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Walk - gegevens registreren</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:opsz,wght@6..12,400;6..12,700;6..12,800;6..12,900&display=swap" rel="stylesheet">

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  >
  <link rel="stylesheet" href="syle.css">
</head>

<body>
  <main class="phone" aria-label="Walk melding formulier">

    <section class="screen is-active" data-screen="details">
      <header class="topbar">
        <img class="logo" src="afbeeldingen/Copy of logo_corail.png" alt="Walk logo">
      </header>

      <div class="hero">
        <h1>Gegevens<br>registreren.</h1>

        <img
          class="walker"
          src="afbeeldingen/meisjewandeld.png"
          alt=""
        >

        <img
          class="scribble"
          src="afbeeldingen/pijl.avif"
          alt=""
        >
      </div>

      <form class="panel details-form" id="detailsForm" novalidate>
        <label for="nameInput">
          <span>Naam</span>
          <input
            id="nameInput"
            name="name"
            type="text"
            placeholder="naam achternaam"
            autocomplete="name"
            required
          >
        </label>

        <label for="emailInput">
          <span>E-mailadres</span>
          <input
            id="emailInput"
            name="email"
            type="email"
            placeholder="naam@email.com"
            autocomplete="email"
            required
          >
        </label>

        <label for="phoneInput">
          <span>Telefoonnummer</span>
          <input
            id="phoneInput"
            name="phone"
            type="tel"
            placeholder="telefoonnumer"
            autocomplete="tel"
            required
          >
        </label>

        <label class="check-row" for="updatesInput">
          <input
            id="updatesInput"
            name="updates"
            type="checkbox"
            required
          >
          <span>Ik wil updates ontvangen over mijn melding.</span>
        </label>

        <p class="error" id="detailsError">
          Vul alle gegevens in om verder te gaan.
        </p>
      </form>

      <footer class="actions">
        <button class="primary" type="button" data-next="location">
          Locatie toevoegen
        </button>

        <button class="link" type="button">
          Annuleren
        </button>
      </footer>
    </section>


    <section class="screen" data-screen="location">
      <header class="topbar">
        <img class="logo" src="afbeeldingen/Copy of logo_corail.png" alt="Walk logo">
      </header>

      <div class="hero">
        <h1>Duid de<br>locatie aan.</h1>

        <img
          class="walker"
          src="afbeeldingen/meisjewandeld.png"
          alt=""
        >

        <img
          class="scribble"
          src="afbeeldingen/pijl.avif"
          alt=""
        >
      </div>

      <section class="panel map-panel">
        <div id="brusselsMap" class="brussels-map"></div>
      </section>

      <footer class="actions">
        <button class="primary" type="button" data-next="category">
          Soort obstakel
        </button>

        <button class="link" type="button" data-prev="details">
          Terug
        </button>
      </footer>
    </section>


    <section class="screen" data-screen="category">
      <header class="topbar">
        <img class="logo" src="afbeeldingen/Copy of logo_corail.png" alt="Walk logo">
      </header>

      <div class="hero">
        <h1>Kies een<br>categorie</h1>

        <img
          class="walker"
          src="afbeeldingen/meisjewandeld.png"
          alt=""
        >

        <img
          class="scribble"
          src="afbeeldingen/pijl.avif"
          alt=""
        >
      </div>

      <section class="panel category-panel">
        <button class="category is-selected" type="button" data-category="Auto" aria-label="Auto"></button>

        <button class="category" type="button" data-category="Step" aria-label="Step"></button>

        <button class="category" type="button" data-category="Vuilbak" aria-label="Vuilbak"></button>

        <button class="category" type="button" data-category="Afval" aria-label="Afval"></button>

        <button class="category" type="button" data-category="Bord" aria-label="Bord"></button>

        <button class="category" type="button" data-category="Terras" aria-label="Terras"></button>
      </section>

      <footer class="actions">
        <button class="primary" type="button">
          Bewijs toevoegen
        </button>

        <button class="link" type="button" data-prev="location">
          Terug
        </button>
      </footer>
    </section>

  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>


  <script src="script.js"></script>
</body>
</html>
